<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Voi Con 💖 Strong Heart</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at top,#220033,#000010,#000);
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

/* sao */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:blink 2.5s infinite;
}
@keyframes blink{50%{opacity:0.2;}}

/* sao băng */
.shooting-star{
    position:absolute;
    width:2px;
    height:120px;
    background:linear-gradient(white,transparent);
    transform:rotate(45deg);
    animation:fall 1.2s linear forwards;
}
@keyframes fall{
    100%{transform:translate(-600px,600px) rotate(45deg);opacity:0;}
}

/* tim bay */
.heart{
    position:absolute;
    font-size:18px;
    animation:float 4s linear forwards;
    filter:drop-shadow(0 0 10px pink);
}
@keyframes float{
    100%{transform:translateY(-700px);opacity:0;}
}

/* ảnh */
.falling-img{
    position:absolute;
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 0 25px hotpink;
    animation:drop linear forwards;
}
@keyframes drop{
    0%{transform:translateY(-120px);opacity:0;}
    15%{opacity:1;}
    100%{transform:translateY(110vh);opacity:0;}
}

/* chữ */
.love-text{
    position:absolute;
    color:#ff4fa0;
    font-size:20px;
    font-weight:bold;
    text-shadow:
        0 0 8px #ff4fa0,
        0 0 18px #ff4fa0,
        0 0 35px #ff1f7a;
    animation:textFade 4s forwards;
}
@keyframes textFade{
    0%{opacity:0; transform:scale(0.8);}
    30%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1.15);}
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<audio id="music" src="ThanhTan1.m4a" loop></audio>

<script>
document.body.addEventListener("click", ()=>{
    document.getElementById("music").play();
});

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

/* ===== FIX MOBILE SCALE ===== */
function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr,dpr);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let startTime=Date.now();
let activated=false;

/* ===== STAR ===== */
for(let i=0;i<400;i++){
    let s=document.createElement("div");
    s.className="star";
    let size=Math.random()*2.2;

    s.style.width=size+"px";
    s.style.height=size+"px";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.opacity=0.3 + Math.random()*0.7;

    document.body.appendChild(s);
}

/* ===== SHOOTING STAR ===== */
setInterval(()=>{
    let s=document.createElement("div");
    s.className="shooting-star";
    s.style.top=Math.random()*50+"%";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1200);
},600);

/* ===== HEART FUNCTION ===== */
function heart(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}

/* ===== PARTICLES (FIX ĐỀU TRONG TIM) ===== */
let particles=[];
let scale=Math.min(window.innerWidth,window.innerHeight)/38;

for(let i=0;i<3200;i++){

    let t=Math.random()*Math.PI*2;
    let p=heart(t);

    let r=Math.sqrt(Math.random()); // 🔥 FIX phân bố đều

    particles.push({
        bx:p.x*r,
        by:p.y*r,

        x:Math.random()*window.innerWidth,
        y:Math.random()*window.innerHeight,

        size:Math.random()*1.4+0.5,
        speed:Math.random()*0.02+0.008
    });
}

/* ===== DRAW ===== */
function draw(){

    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

    let time=(Date.now()-startTime)*0.0028;
    let pulse=1+Math.sin(time*2)*0.06;

    let cx=window.innerWidth/2;
    let cy=window.innerHeight/2;

    ctx.shadowColor="hotpink";
    ctx.shadowBlur=25;

    particles.forEach(p=>{

        let tx=cx + p.bx*scale*pulse;
        let ty=cy - p.by*scale*pulse;

        p.x+=(tx-p.x)*p.speed;
        p.y+=(ty-p.y)*p.speed;

        ctx.fillStyle="rgba(255,60,140,1)";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    if(!activated && Date.now()-startTime>3500){
        activated=true;
        startEffects();
        document.getElementById("music").play().catch(()=>{});
    }

    requestAnimationFrame(draw);
}
draw();

/* ===== EFFECT ===== */
function startEffects(){

if(window.effectsStarted) return;
window.effectsStarted=true;

/* tim bay */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"%";
    h.style.top="100%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
},300);

/* voi bay */
setInterval(()=>{
    let e=document.createElement("div");
    e.className="heart";
    e.innerHTML="🐘";
    e.style.fontSize="35px";
    e.style.left=Math.random()*100+"%";
    e.style.top="100%";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),5000);
},800);

/* ảnh */
let imgs=["vb1.jpg","vb2.jpg","vb3.jpg","vb4.jpg","vb5.jpg"];

setInterval(()=>{
    if(document.querySelectorAll(".falling-img").length>10) return;

    let img=document.createElement("img");
    img.src=imgs[Math.floor(Math.random()*imgs.length)];
    img.className="falling-img";
    img.style.left=Math.random()*100+"%";
    img.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),6000);
},900);

/* text */
let messages=[
"Voi con của Vương Bình 🐘💖",
"Anh thương em 💘",
"Mãi bên nhau nhé 💕",
"Em là tất cả ✨"
];

setInterval(()=>{
    let t=document.createElement("div");
    t.className="love-text";
    t.innerHTML=messages[Math.floor(Math.random()*messages.length)];
    t.style.top=Math.random()*80+"%";
    t.style.left=Math.random()*80+"%";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000);
},1100);

}
</script>

</body>
</html>
