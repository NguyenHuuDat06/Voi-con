<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Voi Con 💖 Strong Heart</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at top,#220033,#000010,#000);
}

/* canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
}

/* sao */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:blink 2.5s infinite;
}
@keyframes blink{50%{opacity:0.2;}}

/* sao băng */
.shooting-star{
    position:absolute;
    width:2px;
    height:120px;
    background:linear-gradient(white,transparent);
    transform:rotate(45deg);
    animation:fall 1.2s linear forwards;
}
@keyframes fall{
    100%{transform:translate(-600px,600px) rotate(45deg);opacity:0;}
}

/* tim bay */
.heart{
    position:absolute;
    font-size:18px;
    animation:float 4s linear forwards;
    filter:drop-shadow(0 0 10px pink);
}
@keyframes float{
    100%{transform:translateY(-700px);opacity:0;}
}

/* ảnh */
.falling-img{
    position:absolute;
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 0 25px hotpink;
    animation:drop linear forwards;
}
@keyframes drop{
    0%{transform:translateY(-120px);opacity:0;}
    15%{opacity:1;}
    100%{transform:translateY(110vh);opacity:0;}
}

/* chữ */
.love-text{
    position:absolute;
    color:#ff4fa0;
    font-size:20px;
    font-weight:bold;
    text-shadow:
        0 0 8px #ff4fa0,
        0 0 18px #ff4fa0,
        0 0 35px #ff1f7a;
    animation:textFade 4s forwards;
}
@keyframes textFade{
    0%{opacity:0; transform:scale(0.8);}
    30%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1.15);}
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<audio id="music" src="ThanhTan1.m4a" loop autoplay></audio>

<script>
    document.body.addEventListener("click", ()=>{
    document.getElementById("music").play();
});
let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
window.onresize=resize;

let startTime=Date.now();
let activated=false;

/* ===== STAR ===== */
/* ===== STAR (dày + anime hơn) ===== */
for(let i=0;i<400;i++){
    let s=document.createElement("div");
    s.className="star";

    let size=Math.random()*2.2;

    s.style.width=size+"px";
    s.style.height=size+"px";

    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";

    /* ⭐ thêm độ sáng ngẫu nhiên */
    s.style.opacity=0.3 + Math.random()*0.7;

    document.body.appendChild(s);
}

/* ===== SHOOTING STAR ===== */
setInterval(()=>{
    let s=document.createElement("div");
    s.className="shooting-star";
    s.style.top=Math.random()*50+"%";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1200);
},600);

/* ===== HEART ===== */
function heart(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}

/* ===== FEWER BUT STRONGER HEART ===== */
let particles=[];
let scale=Math.min(innerWidth,innerHeight)/38;

/* 🔥 ít nhưng đậm + rõ outline */
for(let i=0;i<2800;i++){

    let t=Math.random()*Math.PI*2;
    let p=heart(t);

    /* fill trong nhưng không loãng */
    let fill=Math.pow(Math.random(),0.7);

    particles.push({
        bx:p.x*fill,
        by:p.y*fill,

        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,

        size:Math.random()*1.4+0.4,   // 👈 to hơn -> rõ hơn
        speed:Math.random()*0.025+0.01
    });
}

/* ===== DRAW (ĐẬM + GLOW MẠNH) ===== */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let time=(Date.now()-startTime)*0.0028;
    let pulse=1+Math.sin(time*2)*0.06;

    ctx.shadowColor="hotpink";
    ctx.shadowBlur=28;   /* 🔥 tăng glow */

    particles.forEach(p=>{

        let tx=canvas.width/2 + p.bx*scale*pulse;
        let ty=canvas.height/2 - p.by*scale*pulse;

        p.x+=(tx-p.x)*p.speed;
        p.y+=(ty-p.y)*p.speed;

        /* 🔥 đậm hơn */
        ctx.fillStyle="rgba(255,60,140,1)";

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    if(!activated && Date.now()-startTime>3500){
        activated=true;
        startEffects();
        document.getElementById("music").play().catch(()=>{});
    }

    requestAnimationFrame(draw);
}
draw();

/* ===== EFFECTS ===== */
function startEffects(){

/* tránh chạy nhiều lần */
if(window.effectsStarted) return;
window.effectsStarted=true;

/* ===== TIM BAY ===== */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"%";
    h.style.top="100%";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),4000);
},300);
/* ===== 🐘 VOI BAY (THÊM Ở ĐÂY) ===== */
setInterval(()=>{
    let e=document.createElement("div");
    e.className="heart"; // dùng chung style bay cho nhẹ code
    e.innerHTML="🐘";

    e.style.position="absolute";
    e.style.fontSize="35px";
    e.style.filter="drop-shadow(0 0 10px pink)";

    e.style.left=Math.random()*100+"%";
    e.style.top="100%";

    document.body.appendChild(e);

    setTimeout(()=>e.remove(),5000);
},800);
/* ===== ẢNH BAY ===== */
let imgs=[
"vb1.jpg","vb2.jpg","vb3.jpg","vb4.jpg","vb5.jpg",
"vb6.jpg","vb8.jpg","vb9.jpg","vb10.jpg",
"vb11.jpg","vb12.jpg","vb13.jpg","vb14.jpg","vb15.jpg",
"vb16.jpg","vb17.jpg","vb18.jpg","vb19.jpg","vb20.jpg",
"vb21.jpg","vb22.jpg","vb23.jpg","vb24.jpg","vb25.jpg",
"vb26.jpg","vb27.jpg","vb28.jpg","vb29.jpg","vb30.jpg"
];

/* GIỚI HẠN SỐ ẢNH TRÊN MÀN (QUAN TRỌNG) */
setInterval(()=>{
    if(document.querySelectorAll(".falling-img").length > 12) return;

    let img=document.createElement("img");
    img.src=imgs[Math.floor(Math.random()*imgs.length)];
    img.className="falling-img";
    img.style.left=Math.random()*100+"%";
    img.style.animationDuration=(3+Math.random()*3)+"s";

    document.body.appendChild(img);

    setTimeout(()=>img.remove(),6000);
},900);


let messages=[
"Voi con của Vương Bình 🐘💖",
"Voi con yêu anh nhìu 💘",
"Mãi bên nhau nhé 💕",
"Thanh tân như phút ban đầu ✨",
"Thành phố phía đông",
"Ngày buồn tháng nhớ năm thương",
"Anh bờ vai",
"100<1",
"Cho phép tôi mời anh một ly",
"Bạch Nguyệt Quang",
"Nắng hoa niên",
"Cảm ơn mọi người đã đến chơi với a Bình nhaaaa💖",
"Bình bé xíu của em ơi",
"Cái gì dọ, đừng mò",
"Mong anh luôn vui vẻ và thật nhiều năng lượng nhé💕",
"Have a nice day!!!!!",
"FMT DAY 3, DAY 4 và nhiều DAY nứa ",
"KBPNGKBPLS",
"Thật thành công và rực rỡ",
"Bính anh nhòe e vờ ri đây",
"Cảm ơn anh đã luôn tỏa sáng 🔥🔥",
"Nũng nịu hơn nữa đi anh",
"Đừng tập gym nữa em thích bụng mỡ cơ",
"Iu anh thật nhiều 💘 ",
"Chăm ra Hà Nội gặp voi con nhen",
"chúng ta cùng đồng hành với nhau thêm nhiều năm nữa nhé🫶🏻",
"Keep going, I am behind you",
"Mong sự nghiệp của anh thăng tiến vượt bậc, vươn cao vươn xa",
"Chúc anh luôn tự tin, bứt phá và sáng toả nhé"
];

setInterval(()=>{
    let t=document.createElement("div");
    t.className="love-text";
    t.innerHTML=messages[Math.floor(Math.random()*messages.length)];
    t.style.top=Math.random()*80+"%";
    t.style.left=Math.random()*80+"%";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000);
},1100);

}
</script>

</body>
</html>
